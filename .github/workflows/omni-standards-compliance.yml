---
name: Omni* Ecosystem Standards Compliance

on:
  push:
    branches: [main, develop, "jonah/*", "jonahgabriel/*"]
  pull_request:
    branches: [main, develop]
  merge_group:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.3"
  REPO_NAME: "omnimemory"

# ci-health-ok: blocking mypy --strict already enforced in test.yml lint job

jobs:
  type-union-check:
    name: PEP 604 Type Union Check (UP007)
    # OMNINODE_SELF_HOSTED_RUNS_ON_V1 — do not edit inline; update plan + all occurrences together
    runs-on: >-
      ${{
        (vars.USE_SELF_HOSTED_RUNNERS == 'true' &&
         (github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule'))
        && fromJSON('["self-hosted","omnibase-ci"]')
        || fromJSON('["ubuntu-latest"]')
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check for Optional/Union usage (PEP 604)
        run: uv run ruff check src/ --select UP007,UP006

  ci-naming-convention:
    name: CI Naming Convention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify CI workflow naming convention
        run: |
          if [ ! -f .github/workflows/ci.yml ]; then
            echo "::error::Missing .github/workflows/ci.yml"
            exit 1
          fi
          CI_NAME=$(grep -m1 "^name:" .github/workflows/ci.yml | sed "s/name: *//")
          if [ "$CI_NAME" != "CI" ]; then
            echo "::error::ci.yml has name '$CI_NAME' — must be 'CI'"
            exit 1
          fi
          for legacy in test.yml ci.yaml; do
            if [ -f ".github/workflows/$legacy" ]; then
              echo "::error::Legacy workflow .github/workflows/$legacy exists"
              exit 1
            fi
          done
          echo "CI naming convention: PASS"
