name: Release

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.4.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Assert clean working tree
        run: |
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git ls-files --others --exclude-standard)"

      - name: Validate tag matches pyproject.toml version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          TAG="${TAG#v}"
          PKG_VERSION=$(python3 -c "
          import tomllib, sys
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          v = d.get('project', {}).get('version')
          if not v:
              raise SystemExit('ERROR: missing [project].version in pyproject.toml')
          print(v)
          ")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: tag v${TAG} does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Version validated: $PKG_VERSION"

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Build wheel + sdist
        run: uv build

      - name: Verify dist artifacts exist
        run: |
          ls -la dist/
          ls dist/*.whl dist/*.tar.gz >/dev/null 2>&1 || {
            echo "ERROR: expected wheel + sdist in dist/"
            exit 1
          }

      - name: Publish to PyPI
        run: |
          uv publish --token "$UV_PUBLISH_TOKEN" dist/*.whl dist/*.tar.gz
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Generate checksums
        run: sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS.txt

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') }}

  # ---------------------------------------------------------------------------
  # Post-release: trigger Dockerfile.runtime pin cascade (OMN-5137)
  # ---------------------------------------------------------------------------
  # When omnimemory is released, notify omnibase_infra so its
  # plugin-pin-cascade workflow can bump Dockerfile.runtime pins automatically.
  #
  # REQUIREMENT: CROSS_REPO_PAT secret must be a GitHub PAT with `repo` scope
  # on OmniNode-ai/omnibase_infra (same pattern as omnibase_infra's
  # trigger-runtime-rebuild job).
  notify-plugin-pin-cascade:
    name: Notify Plugin Pin Cascade
    needs: release
    if: ${{ !contains(needs.release.outputs.version, 'rc') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check CROSS_REPO_PAT is configured
        id: token_check
        env:
          CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          if [ -z "$CROSS_REPO_PAT" ]; then
            echo "::warning::CROSS_REPO_PAT secret is not set. Skipping cross-repo dispatch." \
              "Set a PAT with 'repo' scope on OmniNode-ai/omnibase_infra" \
              "as the CROSS_REPO_PAT repository secret to enable plugin pin cascade."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch plugin-release to omnibase_infra
        if: steps.token_check.outputs.has_token == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: OmniNode-ai/omnibase_infra
          event-type: plugin-release
          client-payload: >-
            {
              "package": "omninode-memory",
              "version": "${{ needs.release.outputs.version }}",
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}"
            }
