name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_queue:
  workflow_dispatch:

# Cancel previous runs when new commits are pushed to save CI resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  CACHE_VERSION: "0.1.0"

jobs:
  # =============================================================================
  # JOB ORDERING RATIONALE (Fail-Fast Optimization)
  # =============================================================================
  #
  # Phase 1 - Quick Validation (parallel, ~2-5 min):
  #   - migration-freeze: Block new DB migrations during schema freeze (OMN-2055)
  #   - lint: Code quality (ruff format, ruff check, mypy strict)
  #   - pyright: Type checking (complementary to mypy)
  #   - onex-validation: ONEX pattern validation (pydantic, naming, enums, etc.)
  #   - check-handshake: Architecture handshake verification (cross-repo)
  #
  # Phase 2 - Full Test Suite (after Phase 1 completes):
  #   - test: Run all tests (depends on lint, pyright, onex-validation)
  #   Note: check-handshake runs independently and is evaluated in test-summary,
  #   NOT in test's needs, because it may be skipped on fork PRs and GitHub Actions
  #   propagates skipped status to dependent jobs.
  #
  # Phase 3 - Aggregation:
  #   - test-summary: Aggregates all job results
  #
  # CONFIGURATION SYNC NOTE:
  # These validations are synchronized with .pre-commit-config.yaml
  # Pre-commit runs subset at commit time, full validation at pre-push
  #
  # SHARED CONFIGURATION FILES (synchronized with .pre-commit-config.yaml):
  # - pyproject.toml: ruff [tool.ruff] (^0.8.0), mypy [tool.mypy] (^1.14.0), pyright (^1.1.390)
  # - pyrightconfig.json: pyright settings (typeCheckingMode: basic, python 3.12)
  # NOTE: UP007 (PEP 604 union syntax) is ENABLED and organizationally mandated
  #
  # CI-TO-HOOK SYNCHRONIZATION MAP:
  # CI Job          | Pre-commit Hook                   | Command
  # ----------------|-----------------------------------|----------------------------------
  # migration-freeze| migration-freeze-check (pre-commit)| ./scripts/check_migration_freeze.sh [--ci]
  # lint            | ruff-format (pre-commit)          | ruff format --check src/ tests/
  # lint            | ruff (pre-commit)                 | ruff check src/ tests/
  # lint            | mypy-type-check (pre-push)        | mypy --show-error-codes --no-error-summary src/omnimemory
  # pyright         | pyright-type-check (pre-push)     | pyright src/omnimemory
  # onex-validation | validate-pydantic-patterns        | python scripts/validation/validate_pydantic_patterns.py src/
  # onex-validation | validate-single-class-per-file    | python scripts/validation/validate_single_class_per_file.py src/omnimemory/models/
  # onex-validation | validate-enum-casing              | python scripts/validation/validate_enum_casing.py src/omnimemory/enums/
  # onex-validation | validate-no-backward-compatibility| python scripts/validation/validate_no_backward_compatibility.py -d src/
  # onex-validation | validate-secrets                  | python scripts/validation/validate_secrets.py src/
  # onex-validation | onex-validate-naming              | python scripts/validation/validate_naming.py src/
  # onex-validation | validate-http-imports             | python scripts/validation/validate_http_imports.py src/
  # onex-validation | validate-kafka-imports            | python scripts/validation/validate_kafka_imports.py src/
  # onex-validation | validate-model-locations          | python scripts/validation/validate_model_locations.py src/
  # transport-import-guard | validate-no-transport-imports | python scripts/validate_no_transport_imports.py --src-dir src/omnimemory --exclude src/omnimemory/runtime --whitelist tests/audit/transport_import_whitelist.yaml
  # contract-validation | contract-linter                | python -m omnimemory.tools.contract_linter <contracts>
  # io-audit        | io-audit                          | python -m omnimemory.audit
  #
  # IMPORTANT: When modifying any CI step, update the corresponding hook in .pre-commit-config.yaml
  # =============================================================================

  # Phase 1 - Migration Freeze Enforcement
  # Blocks new migrations when .migration_freeze exists (DB-per-repo refactor OMN-2055)
  # SYNC: Pre-commit hook 'migration-freeze-check' at pre-commit stage
  migration-freeze:
    name: Migration Freeze Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed for three-dot diff (merge-base with origin/main)

      - name: Check migration freeze
        run: ./scripts/check_migration_freeze.sh --ci
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

  # Phase 1 - Code Quality
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      # SYNC: Pre-commit hook 'ruff-format' at pre-commit stage
      # Both pre-commit and CI use --check for consistent validation
      - name: Check ruff formatting
        run: uv run ruff format --check src/ tests/

      # SYNC: Pre-commit hook 'ruff-check' at pre-commit stage
      # Both pre-commit and CI use check-only mode (no --fix)
      - name: Check ruff linting (includes import sorting)
        run: uv run ruff check src/ tests/

      # SYNC: Pre-commit hook 'mypy-type-check' at pre-push stage
      # Both pre-commit and CI use same flags for consistent output
      - name: Run mypy type checking (strict)
        run: uv run mypy --show-error-codes --no-error-summary src/omnimemory

  # Phase 1 - Pyright Type Checking
  pyright:
    name: Pyright Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      # SYNC: Pre-commit hook 'pyright-type-check' at pre-push stage
      # Uses pyrightconfig.json for project-level settings
      - name: Run pyright type checking
        run: uv run pyright src/omnimemory

  # Phase 1 - ONEX Validation
  onex-validation:
    name: ONEX Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      # SYNC: Pre-commit hook 'validate-pydantic-patterns' at pre-commit stage
      - name: Validate Pydantic patterns
        run: uv run python scripts/validation/validate_pydantic_patterns.py src/

      # SYNC: Pre-commit hook 'validate-single-class-per-file' at pre-commit stage
      - name: Validate single class per file
        run: uv run python scripts/validation/validate_single_class_per_file.py src/omnimemory/models/

      # SYNC: Pre-commit hook 'validate-enum-casing' at pre-commit stage
      - name: Validate enum casing
        run: uv run python scripts/validation/validate_enum_casing.py src/omnimemory/enums/

      # SYNC: Pre-commit hook 'validate-no-backward-compatibility' at pre-commit stage
      - name: Validate no backward compatibility
        run: uv run python scripts/validation/validate_no_backward_compatibility.py -d src/

      # SYNC: Pre-commit hook 'validate-secrets' at pre-commit stage
      - name: Validate secrets
        run: uv run python scripts/validation/validate_secrets.py src/

      # SYNC: Pre-commit hook 'onex-validate-naming' at pre-commit stage
      # Both local and CI run naming validation at the same stage for consistency
      - name: Validate naming conventions
        run: uv run python scripts/validation/validate_naming.py src/

      # SYNC: Pre-commit hook 'validate-http-imports' at pre-commit stage
      # Enforces HTTP import boundary - all HTTP calls must go through adapter layer
      - name: Validate HTTP import boundary
        run: uv run python scripts/validation/validate_http_imports.py src/

      # SYNC: Pre-commit hook 'validate-kafka-imports' at pre-commit stage
      # Enforces ARCH-002 - runtime owns all Kafka plumbing, nodes use EventBus SPI
      - name: Validate Kafka import boundary (ARCH-002)
        run: uv run python scripts/validation/validate_kafka_imports.py src/

      - name: ONEX validation summary
        if: always()
        run: |
          echo "## ONEX Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validated the following ONEX patterns:" >> $GITHUB_STEP_SUMMARY
          echo "- Pydantic patterns" >> $GITHUB_STEP_SUMMARY
          echo "- Single class per file" >> $GITHUB_STEP_SUMMARY
          echo "- Enum member casing (UPPER_SNAKE_CASE)" >> $GITHUB_STEP_SUMMARY
          echo "- No backward compatibility anti-patterns" >> $GITHUB_STEP_SUMMARY
          echo "- Secret detection" >> $GITHUB_STEP_SUMMARY
          echo "- Naming conventions" >> $GITHUB_STEP_SUMMARY
          echo "- HTTP import boundary enforcement" >> $GITHUB_STEP_SUMMARY
          echo "- Kafka import boundary enforcement (ARCH-002)" >> $GITHUB_STEP_SUMMARY
          echo "- Pydantic model location enforcement" >> $GITHUB_STEP_SUMMARY

  # Phase 1 - Transport Import Guard (ARCH-002)
  # SYNC: Pre-commit hook 'validate-no-transport-imports' at pre-commit stage
  # Added: OMN-2218
  transport-import-guard:
    name: Transport Import Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PyYAML for transport import guard
        run: pip install pyyaml

      - name: Validate no transport imports in nodes (ARCH-002)
        run: python scripts/validate_no_transport_imports.py --src-dir src/omnimemory --exclude src/omnimemory/runtime --whitelist tests/audit/transport_import_whitelist.yaml

  # Phase 1 - Contract Validation
  # SYNC: Pre-commit hook 'contract-linter' at pre-commit stage
  # Added: OMN-2218
  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Find and validate contract YAML files
        run: |
          contracts=$(find src/omnimemory/nodes src/omnimemory/handlers -name "contract.yaml" -type f 2>/dev/null)
          if [ -z "$contracts" ]; then
            echo "No contract files found - skipping validation"
            exit 0
          fi
          echo "Found contract files:"
          echo "$contracts"
          echo ""
          uv run python -m omnimemory.tools.contract_linter --verbose $contracts

  # Phase 1 - I/O Audit
  # SYNC: Pre-commit hook 'io-audit' at pre-commit stage
  # Added: OMN-2218
  io-audit:
    name: I/O Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run I/O audit
        run: uv run python -m omnimemory.audit

  # Phase 1 - Architecture Handshake Verification
  check-handshake:
    name: Verify Architecture Handshake
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip on fork PRs - forks may not have access to cross-repo checkout
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Uses default GITHUB_TOKEN which has read access to public repos in the org.
      # Same pattern as omniclaude ci-cd.yml. If omnibase_core becomes private,
      # add: token: ${{ secrets.OMNIBASE_CORE_ACCESS_TOKEN }}
      - name: Checkout omnibase_core
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/omnibase_core
          path: omnibase_core

      - name: Verify handshake is current
        id: verify-handshake
        run: |
          echo "::group::Architecture Handshake Verification"
          if [ ! -f "./omnibase_core/architecture-handshakes/check-handshake.sh" ]; then
            echo "::error::check-handshake.sh not found in omnibase_core"
            exit 1
          fi
          echo "Verifying .claude/architecture-handshake.md matches source in omnibase_core..."
          echo ""
          ./omnibase_core/architecture-handshakes/check-handshake.sh ./omnibase_core
          echo "::endgroup::"

      - name: Handshake verification summary
        if: always()
        run: |
          result="${{ steps.verify-handshake.outcome }}"
          echo "## Architecture Handshake" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${result}" = "success" ]; then
            echo "Verified .claude/architecture-handshake.md matches source in omnibase_core" >> $GITHUB_STEP_SUMMARY
          else
            echo "Handshake verification failed or was skipped; see logs." >> $GITHUB_STEP_SUMMARY
          fi

  # Phase 2 - Test Suite
  test:
    name: Tests
    needs: [lint, pyright, onex-validation, transport-import-guard, contract-validation, io-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Performance test threshold (relaxed for CI variance)
      # Local dev uses 50ms default, CI uses 100ms for tolerance
      PERF_THRESHOLD_MS: "100"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: |
          uv run pytest tests/ \
            -n auto \
            --timeout=60 \
            --timeout-method=thread \
            --tb=short \
            --junitxml=junit.xml \
            --cov=src/omnimemory \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: junit.xml
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # Phase 3 - Aggregation
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [migration-freeze, lint, pyright, onex-validation, transport-import-guard, contract-validation, io-audit, check-handshake, test]
    if: always()

    steps:
      - name: Check test results
        run: |
          migration_freeze="${{ needs.migration-freeze.result }}"
          lint="${{ needs.lint.result }}"
          pyright="${{ needs.pyright.result }}"
          onex="${{ needs.onex-validation.result }}"
          transport="${{ needs.transport-import-guard.result }}"
          contracts="${{ needs.contract-validation.result }}"
          io_audit="${{ needs.io-audit.result }}"
          handshake="${{ needs.check-handshake.result }}"
          test="${{ needs.test.result }}"

          if [[ "$migration_freeze" == "success" ]] && \
             [[ "$lint" == "success" ]] && \
             [[ "$pyright" == "success" ]] && \
             [[ "$onex" == "success" ]] && \
             [[ "$transport" == "success" ]] && \
             [[ "$contracts" == "success" ]] && \
             [[ "$io_audit" == "success" ]] && \
             [[ "$handshake" == "success" || "$handshake" == "skipped" ]] && \
             [[ "$test" == "success" ]]; then
            echo "All tests passed successfully"
            echo "Migration Freeze: Passed"
            echo "Code Quality: Passed"
            echo "Pyright Type Checking: Passed"
            echo "ONEX Validation: Passed"
            echo "Transport Import Guard: Passed"
            echo "Contract Validation: Passed"
            echo "I/O Audit: Passed"
            echo "Architecture Handshake: $handshake"
            echo "Tests: Passed"
            exit 0
          else
            echo "Tests failed"
            echo "Migration Freeze: $migration_freeze"
            echo "Lint: $lint"
            echo "Pyright: $pyright"
            echo "ONEX Validation: $onex"
            echo "Transport Import Guard: $transport"
            echo "Contract Validation: $contracts"
            echo "I/O Audit: $io_audit"
            echo "Architecture Handshake: $handshake"
            echo "Tests: $test"
            exit 1
          fi
