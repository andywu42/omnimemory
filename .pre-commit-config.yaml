---
# OmniMemory Pre-commit Configuration
# Aligned with ONEX ecosystem standards from omnibase_core
#
# REQUIREMENTS:
# ====================================
# Python version: 3.12 (must match .github/workflows/test.yml PYTHON_VERSION)
#
# CONFIGURATION FILES (shared with CI):
# ====================================
# - pyproject.toml: ruff settings [tool.ruff], mypy settings [tool.mypy]
#   - Ruff version: 0.15.2 (synchronized with pre-commit repo)
#   - Mypy version: uses poetry env (local hook, matches CI exactly)
#   - Pyright version: 1.1.391 (synchronized with pre-commit repo)
# - pyrightconfig.json: pyright settings (typeCheckingMode: basic, python 3.12)
#
# CI COMPATIBILITY:
# ====================================
# Python hooks use language: python or official repos (NOT language: system).
# This ensures hooks work in CI environments where Poetry may not be installed.
# Pre-commit manages isolated Python environments for each hook.
#
# Exceptions using language: system:
#   - clean-tmp-directory: bash script only, no Python dependencies, safe for CI
#   - contract-linter, io-audit: require Poetry (uses `poetry run`). CI installs
#     Poetry explicitly. Locally, `poetry install` must be run first.
#   - mypy: uses `poetry run` for exact dependency match with CI.
#
# HOOK-TO-CI SYNCHRONIZATION MAP:
# ====================================
# Pre-commit Hook                   | CI Workflow Job          | Command
# ----------------------------------|--------------------------|----------------------------------
# migration-freeze-check (pre-commit)| migration-freeze        | ./scripts/check_migration_freeze.sh [--ci]
# ruff-format (pre-commit)          | lint                     | ruff format --check src/ tests/
# ruff (pre-commit)                 | lint                     | ruff check src/ tests/
# mypy-type-check (pre-push)        | lint                     | mypy --show-error-codes --no-error-summary src/omnimemory
# pyright (pre-push)                | pyright                  | pyright src/omnimemory
# validate-pydantic-patterns        | onex-validation          | python scripts/validation/validate_pydantic_patterns.py src/
# validate-single-class-per-file    | onex-validation          | python scripts/validation/validate_single_class_per_file.py src/omnimemory/models/
# validate-enum-casing              | onex-validation          | python scripts/validation/validate_enum_casing.py src/omnimemory/enums/
# validate-no-backward-compatibility| onex-validation          | python scripts/validation/validate_no_backward_compatibility.py -d src/
# validate-secrets                  | onex-validation          | python scripts/validation/validate_secrets.py src/
# onex-validate-naming              | onex-validation          | python scripts/validation/validate_naming.py src/
# validate-http-imports             | onex-validation          | python scripts/validation/validate_http_imports.py src/
# validate-kafka-imports            | onex-validation          | python scripts/validation/validate_kafka_imports.py src/
# validate-model-locations          | onex-validation          | python scripts/validation/validate_model_locations.py src/
# validate-no-transport-imports     | transport-import-guard   | python scripts/validate_no_transport_imports.py --src-dir src/omnimemory --exclude src/omnimemory/runtime --whitelist tests/audit/transport_import_whitelist.yaml
# contract-linter                   | contract-validation      | python -m omnimemory.tools.contract_linter <contracts>
# io-audit                          | io-audit                 | python -m omnimemory.audit
#
# IMPORTANT: When modifying any hook, update the corresponding CI job in .github/workflows/test.yml
#
# PERFORMANCE OPTIMIZATION:
# ====================================
# Two-stage validation strategy for optimal developer experience:
#
# PRE-COMMIT:
#   - Formatting checks (ruff format --check, yamlfmt)
#   - Linting checks (ruff check)
#   - Basic file checks (whitespace, large files, merge conflicts)
#   - Security checks (secrets)
#   - ONEX pattern validations (pydantic, single-class, enums, naming)
#   NOTE: Run `ruff format src/ tests/` and
#         `ruff check --fix src/ tests/` manually to auto-fix
#
# PRE-PUSH (quick validation before sharing):
#   - mypy type checking (full src/omnimemory - synced with CI)
#   - pyright type checking (full src/omnimemory - synced with CI)
#
# USAGE:
#   pre-commit install                    # Install pre-commit hooks
#   pre-commit install --hook-type pre-push  # Install pre-push hooks
#   pre-commit run --all-files            # Run all pre-commit hooks
#   pre-commit run --all-files --hook-stage pre-push  # Run pre-push hooks

repos:
  # Stub implementation detection — sourced from omnibase_core (OMN-4472)
  - repo: https://github.com/OmniNode-ai/omnibase_core
    rev: 30a06f85bb5849902d33c8d0bdb90fc6cba0c346  # pragma: allowlist secret
    hooks:
      - id: check-stub-implementations
  # YAML formatting (standard across ecosystem)
  # Configuration in .yamlfmt file (ecosystem-aligned settings)
  - repo: https://github.com/google/yamlfmt
    rev: v0.17.2
    hooks:
      - id: yamlfmt
        exclude: ^\.github/

  # Essential file formatting (standard across ecosystem)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^\.github/workflows/
      - id: end-of-file-fixer
        exclude: ^(\.github/workflows/|\.mcp\.json$)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: debug-statements

  # ONEX String Version Anti-Pattern Detection
  # TODO(OMN-3832-followup): Re-enable once validate-string-versions is packaged as a
  # proper Python CLI entrypoint in omnibase_core (currently only works as a local script).

  # Python code quality with ruff (replaces black, isort, flake8 - 10-100x faster)
  # Configuration: pyproject.toml [tool.ruff] section (shared with CI)
  # Using official ruff-pre-commit repo for CI compatibility (no Poetry dependency)
  #
  # VERSION UPGRADE PROCEDURE:
  # ==========================
  # Ruff has breaking rule changes between minor versions (e.g., rules renamed,
  # removed, or behavior changed). When upgrading:
  #
  # 1. Run: pre-commit autoupdate --repo https://github.com/astral-sh/ruff-pre-commit
  # 2. Run: pre-commit run --all-files  (check for new violations)
  # 3. Review ruff changelog: https://github.com/astral-sh/ruff/blob/main/CHANGELOG.md
  # 4. Update pyproject.toml [tool.ruff] version comment to match new rev
  # 5. Fix any new violations or update rule selections in pyproject.toml
  #
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      # FULL CODEBASE VALIDATION: These hooks run on src/ and tests/ (not just staged files)
      # to match CI behavior and prevent "works locally, fails in CI" issues.
      # NOTE: Both pre-commit and CI use check-only mode. Run `ruff format src/ tests/`
      # and `ruff check --fix src/ tests/` manually to auto-fix issues.
      - id: ruff-format
        name: ruff format (check entire codebase)
        # SYNCHRONIZED WITH CI: Identical to .github/workflows/test.yml lint job
        # Both pre-commit and CI use --check for consistent validation
        args: [--check, src/, tests/]
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff
        name: ruff check (lint entire codebase)
        # SYNCHRONIZED WITH CI: Identical to .github/workflows/test.yml lint job
        # Both pre-commit and CI use check-only mode (no --fix)
        # Note: The ruff hook already runs "ruff check", so we only pass paths
        args: [src/, tests/]
        pass_filenames: false
        stages: [pre-commit]

  # Type checking with mypy (using local environment for exact CI match)
  # NOTE: Uses language: system with poetry to ensure identical mypy config,
  # dependencies, and type stubs as CI. The mirrors-mypy approach failed to
  # pick up pyproject.toml overrides for redis modules.
  - repo: local
    hooks:
      - id: mypy-type-check
        name: mypy (type checking - strict)
        # SYNCHRONIZED WITH CI: Identical to .github/workflows/test.yml lint job
        entry: poetry run mypy --show-error-codes --no-error-summary src/omnimemory
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

  # Type checking with pyright (using official repo for CI compatibility)
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.391
    hooks:
      - id: pyright
        name: pyright (type checking - basic)
        # SYNCHRONIZED WITH CI: Must match .github/workflows/test.yml pyright job
        # Uses pyrightconfig.json for project-level settings
        args: [src/omnimemory]
        pass_filenames: false
        stages: [pre-push]

  # Local hooks for cleanup, migration freeze, and ONEX validation
  # These use language: python or language: system with no Poetry dependency
  - repo: local
    hooks:
      # --------------------------------------------------------------------------
      # Migration Freeze Check - Block new migrations during DB-per-repo refactor
      # Validates: No new .sql files added to deployment/database/migrations/
      # Scope: Only triggers when migration files or .migration_freeze change
      # Purpose: Enforces schema freeze (OMN-2055) while .migration_freeze exists
      # --------------------------------------------------------------------------
      - id: migration-freeze-check
        name: migration freeze check
        entry: ./scripts/check_migration_freeze.sh
        language: system
        pass_filenames: false
        # Trigger when migration files or the freeze file itself change.
        # Note: pre-commit sees deletions in the changeset, so deleting
        # .migration_freeze will trigger this hook. The script then checks
        # [ ! -f .migration_freeze ] at runtime and exits 0, which means
        # removing the freeze file + adding a migration in the same commit
        # is intentionally allowed (freeze is lifted).
        files: ^(deployment/database/migrations/|\.migration_freeze)
        stages: [pre-commit]

      # Cleanup: Clear tmp/ directory before commits
      - id: onex-validate-clean-root
        name: Clean tmp directory
        entry: bash -c "rm -rf tmp/* 2>/dev/null || true"
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      # ONEX Pydantic Pattern Validation
      # Validates Pydantic models follow ONEX conventions
      # Uses language: python so pre-commit manages the environment (no Poetry needed)
      - id: validate-pydantic-patterns
        name: ONEX Pydantic Pattern Validation
        entry: python scripts/validation/validate_pydantic_patterns.py
        language: python
        pass_filenames: true
        files: ^src/.*\.py$
        exclude: ^tests/.*\.py$
        stages: [pre-commit]

      # ONEX Single Class Per File (enforces model-per-file pattern)
      - id: validate-single-class-per-file
        name: ONEX Single Class Per File
        entry: python scripts/validation/validate_single_class_per_file.py
        language: python
        pass_filenames: true
        files: ^src/omnimemory/models/.*\.py$
        exclude: ^(tests/|src/omnimemory/protocols/).*\.py$
        stages: [pre-commit]

      # ONEX No Backward Compatibility Anti-Pattern Detection
      - id: validate-no-backward-compatibility
        name: ONEX Backward Compatibility Anti-Pattern Detection
        entry: python scripts/validation/validate_no_backward_compatibility.py
        args: ['-d', 'src/']
        language: python
        pass_filenames: false
        files: ^.*\.py$
        stages: [pre-commit]

      # ONEX Enum Member Casing Validation
      # Enforces UPPER_SNAKE_CASE for all enum member names
      - id: validate-enum-casing
        name: ONEX Enum Member Casing Validation
        entry: python scripts/validation/validate_enum_casing.py
        language: python
        pass_filenames: true
        files: ^src/omnimemory/enums/.*\.py$
        stages: [pre-commit]

      # Secret Detection (prevents hardcoded secrets)
      - id: validate-secrets
        name: ONEX Secret Detection
        entry: python scripts/validation/validate_secrets.py
        language: python
        pass_filenames: true
        files: ^src/.*\.py$
        exclude: ^tests/.*\.py$
        stages: [pre-commit]

      # Naming Convention Validation
      # SYNCHRONIZED WITH CI: Runs at pre-commit stage to match CI Phase 1
      # Both local and CI validate naming conventions at the same point
      - id: onex-validate-naming
        name: ONEX Naming Convention Validation
        entry: python scripts/validation/validate_naming.py
        args: ['src/']
        language: python
        pass_filenames: false
        files: ^src/.*\.py$
        exclude: ^tests/.*\.py$
        stages: [pre-commit]

      # HTTP Import Boundary Enforcement (OMN-1391)
      # Ensures direct HTTP client imports (httpx, requests) are only in adapter layer
      # This enforces the contract boundary principle for external HTTP calls
      - id: validate-http-imports
        name: ONEX HTTP Import Boundary Enforcement
        entry: python scripts/validation/validate_http_imports.py
        args: ['src/']
        language: python
        pass_filenames: false
        files: ^src/.*\.py$
        exclude: ^tests/.*\.py$
        stages: [pre-commit]

      # Kafka Import Boundary Enforcement (ARCH-002)
      # Ensures direct Kafka consumer imports do not appear in nodes/
      # Nodes must use the EventBus SPI from the runtime layer
      - id: validate-kafka-imports
        name: ONEX Kafka Import Boundary Enforcement (ARCH-002)
        entry: python scripts/validation/validate_kafka_imports.py
        args: ['src/']
        language: python
        pass_filenames: false
        # NOTE: This filter is coupled to ENFORCED_PATHS in the script
        # (scripts/validation/validate_kafka_imports.py). If ENFORCED_PATHS
        # changes, update this pattern to match so the hook triggers correctly.
        files: ^src/omnimemory/nodes/.*\.py$
        exclude: ^tests/.*\.py$
        stages: [pre-commit]

      # Pydantic Model Location Enforcement (ONEX compliance)
      # Ensures Pydantic models are in approved directories (models/, nodes/*/models/, protocols/)
      # This enforces ONEX architectural patterns for model organization
      - id: validate-model-locations
        name: ONEX Pydantic Model Location Enforcement
        entry: python scripts/validation/validate_model_locations.py
        args: ['src/']
        language: python
        pass_filenames: false
        files: ^src/.*\.py$
        exclude: ^tests/.*\.py$
        stages: [pre-commit]

      # --------------------------------------------------------------------------
      # Transport Import Validator - ARCH-002 enforcement (AST-based)
      # Validates: Nodes do not import transport/I/O libraries at runtime
      # Scope: All source files (ARCH-002 applies broadly; runtime excluded)
      # Purpose: Enforces "Nodes never touch Kafka directly. Runtime owns all
      #          Kafka plumbing." TYPE_CHECKING imports are allowed.
      # Whitelist: Pre-existing violations in tests/audit/transport_import_whitelist.yaml
      # Banned: aiohttp, httpx, asyncpg, aiokafka, redis, grpc, etc.
      # Added: OMN-2218
      # --------------------------------------------------------------------------
      - id: validate-no-transport-imports
        name: ARCH-002 Transport Import Guard (AST-based)
        entry: python scripts/validate_no_transport_imports.py --src-dir src/omnimemory --exclude src/omnimemory/runtime
          --whitelist tests/audit/transport_import_whitelist.yaml
        language: python
        pass_filenames: false
        types: [python]
        files: ^src/omnimemory/
        stages: [pre-commit]
        additional_dependencies: [pyyaml]

      # --------------------------------------------------------------------------
      # Contract Linter - ONEX contract YAML validation
      # Validates: Node contracts against structural rules
      # Scope: Contract YAML files in node directories
      # Requires: poetry install (language: system, uses Poetry environment)
      # Added: OMN-2218
      # --------------------------------------------------------------------------
      - id: contract-linter
        name: ONEX Contract Linter
        description: Validates node contract YAML files. Requires Poetry (poetry install).
        entry: poetry run python -m omnimemory.tools.contract_linter
        language: system
        pass_filenames: true
        # SYNC: CI uses `find src/omnimemory -name contract.yaml` with graceful
        # skip in .github/workflows/test.yml contract-validation job. This regex
        # scopes the pre-commit hook; the CI job discovers files independently.
        files: ^src/omnimemory/(nodes|handlers)/.*/contract\.yaml$
        stages: [pre-commit]

      # --------------------------------------------------------------------------
      # I/O Audit - ONEX node purity enforcement
      # Validates: Compute nodes do not have forbidden I/O patterns
      # Scope: Node source files and audit module changes
      # Purpose: Enforces architectural boundary between pure compute and effect nodes
      # Requires: poetry install (language: system, uses Poetry environment)
      # Added: OMN-2218
      # --------------------------------------------------------------------------
      - id: io-audit
        name: I/O Audit (ONEX node purity)
        description: Audits node purity for forbidden I/O. Requires Poetry (poetry install).
        entry: poetry run python -m omnimemory.audit
        language: system
        pass_filenames: false
        types: [python]
        files: ^(src/omnimemory/nodes/|src/omnimemory/audit/)
        stages: [pre-commit]

      - id: no-planning-docs
        name: Block planning docs (belong in omni_home/docs/plans/)
        entry: >
          bash -c 'PLAN_FILES=$(git diff --cached --name-only -- "docs/plans/"); if [ -n "$PLAN_FILES"
          ]; then echo "ERROR: Planning docs must live in omni_home/docs/plans/, not in this repo:"; echo
          "$PLAN_FILES"; echo ""; echo "Move your file to: /Volumes/PRO-G40/Code/omni_home/docs/plans/";
          exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: no-internal-ips
        name: Block hardcoded internal IPs
        language: system
        entry: >
          bash -c 'grep -rInE --include="*.py" --include="*.sh" --include="*.yml" --include="*.yaml" --include="*.toml"
          --include="*.md" "(192\.168\.|10\.(0|1|2)\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)" src/ tests/ docs/
          .github/ 2>/dev/null | grep -v "onex-allow-internal-ip" && echo "ERROR: hardcoded internal IP
          found (add # onex-allow-internal-ip to suppress)" && exit 1 || exit 0'
        pass_filenames: false
        stages: [pre-commit]
      - id: check-ai-slop
        name: Check for AI-slop patterns
        language: system
        entry: uv run python scripts/validation/check_ai_slop.py --strict
        types_or: [python, markdown]
        pass_filenames: true
        stages: [pre-commit]

      # --------------------------------------------------------------------------
      # Environment File Protection (OMN-3695.5)
      # Validates: No .env files staged (except .env.example)
      # Purpose: Prevents accidental commits of .env files to the repository.
      #          All environment config must go in ~/.omnibase/.env (shared single
      #          source of truth across all repos).
      # --------------------------------------------------------------------------
      - id: no-env-file
        name: Reject committed .env files (except .env.example)
        entry: >
          bash -c ' BLOCKED_FILES=$(git diff --cached --name-only | grep -E "(^|/)\\.env([._-].+)?$" |
          grep -v "\\.env\\.example" || true); if [ -n "$BLOCKED_FILES" ]; then
            echo "BLOCKED: .env file staged — use ~/.omnibase/.env instead. Run: git reset HEAD <file>";
            echo "$BLOCKED_FILES";
            exit 1;
          fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # --------------------------------------------------------------------------
      # Bolt URI Hardcode Guard (OMN-4314)
      # Validates: No bolt://localhost literal strings in production Python source.
      # Scope: src/ (non-test files). Test files exempt (*test_*, *conftest*, */tests/*).
      # Purpose: Catches the class of bug where a developer hardcodes
      #          connection_uri="bolt://localhost:7687" in production code.
      #          bolt://localhost resolves to the container itself inside Docker,
      #          not the Memgraph service (omnibase-infra-memgraph). Always read
      #          OMNIMEMORY_MEMGRAPH_HOST/PORT from environment instead.
      # Parallel to: kafka-no-hardcoded-fallback in omnibase_infra
      # --------------------------------------------------------------------------
      - id: no-hardcoded-bolt-fallback
        name: "No hardcoded bolt://localhost URIs"
        language: script
        entry: scripts/check_no_hardcoded_bolt.sh
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      # --------------------------------------------------------------------------
      # SPDX Header Enforcement (ONEX canonical)
      # Validates: All eligible source files carry MIT SPDX headers
      # Scope: src/, tests/, scripts/, examples/ (py, sh, bash, yml, yaml, toml)
      # --------------------------------------------------------------------------
      - id: validate-spdx-headers
        name: ONEX SPDX Header Requirement
        entry: python scripts/validation/validate_spdx_headers.py
        language: system
        pass_filenames: true
        files: ^(src|tests|scripts|examples)/.*\.py$
        exclude: ^(archived/|archive/)
        stages: [pre-commit]

# Configuration
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]
fail_fast: false

# pre-commit.ci configuration
#
# AUTOFIX BEHAVIOR EXPLAINED:
# ===========================
# autofix_prs: true means pre-commit.ci will automatically commit fixes and create
# a PR when hooks modify files. However, not all hooks can auto-fix.
#
# HOOKS THAT WILL AUTO-FIX (pre-commit.ci will commit these changes):
#   - yamlfmt: Reformats YAML files to match .yamlfmt settings
#   - trailing-whitespace: Removes trailing whitespace from lines
#   - end-of-file-fixer: Ensures files end with a single newline
#
# HOOKS THAT WILL NOT AUTO-FIX (check-only mode, will fail but not modify files):
#   - ruff-format: Uses --check flag (validates formatting, doesn't reformat)
#   - ruff check: No --fix flag (reports lint issues, doesn't fix them)
#   - mypy/pyright: Type checkers (report errors, cannot auto-fix code)
#   - validate-* hooks: ONEX validators (report violations, cannot auto-fix)
#   - check-* hooks: Detectors only (check-yaml, check-toml, etc.)
#   - debug-statements: Detector only (reports but doesn't remove)
#
# WHY autofix_prs: true?
#   The formatting hooks (yamlfmt, trailing-whitespace, end-of-file-fixer) provide
#   value by auto-fixing minor formatting issues. For ruff issues, run manually:
#     ruff format src/ tests/        # Fix formatting
#     ruff check --fix src/ tests/   # Fix lint issues
#
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes for omnimemory

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_schedule: weekly
  submodules: false
